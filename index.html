<html>

<head>
    <link rel="stylesheet" href="./fakeCAPTCHA.css">
    <script src="./fakeCAPTCHA.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-confirm/3.3.4/jquery-confirm.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-confirm/3.3.4/jquery-confirm.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证您是否为入机|cbbff</title>
    <style>
        html {
            width: 480px;
        }

        #main {
            /*text-align: center; 让div内部文字居中*/
            background-color: #fff;
            border-radius: 20px;
            max-width: 360;
            margin: auto;
            position: absolute;
            top: 0; 
            left: 0;
            right: 0;
            bottom: 0;
        }

        h2 {
            word-wrap: break-word;
            word-break: break-all;
        }

        h3 {
            word-wrap: break-word;
            word-break: break-all;
        }

        #redirectButton {
            background-color: #9E9E9E;
            /* 背景色接近谷歌按钮的浅灰色 */
            color: #FAFAFA;
            /* 字体颜色接近谷歌按钮的蓝色 */
            border-radius: 22px;
            /* 圆角 */
            padding: 10px 20px;
            /* 内边距 */
            font-size: 14px;
            /* 文本大小 */
            font-weight: 500;
            /* 字体粗细 */
            cursor: pointer;
            transition: all 0.3s ease;
            /* 平滑过渡效果 */
        }

        #redirectButton:enabled {
            cursor: pointer;
            /* 鼠标变为指针 */
        }

        #redirectButton:enabled:hover {
            background-color: #2979FF;
            /* 悬停时背景色 */
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            /* 添加轻微阴影 */
        }

        #redirectButton:disabled {
            background-color: #9E9E9E;
            /* 禁用时背景色 */
            color: #FAFAFA;
            /* 禁用时字体颜色 */
            cursor: not-allowed;
            /* 禁用时鼠标变为禁用状态 */
        }

        #redirectButton:disabled:hover {
            background-color: #9E9E9E;
            /* 禁用时悬停状态 */
            box-shadow: none;
            /* 禁用时不显示阴影 */
        }
    </style>
</head>

<body>
    <div id="main">
        <h2>在访问cbbff.us.kg之前，我们需要验证您是否为入机。</h2>
        <h3>点击下方进行验证。</h3>
        <div id="captcha"></div><!-- 跳转按钮 --><button id="redirectButton" onclick="handleRedirect()"
            disabled>请先进行验证</button>
        <p>验证服务由<a href="http://eterill.us.kg/">EternalIllusion</a>友情提供。</p>
    </div>
    <script>
        // 配置假验证码
        var config = {
            element: "#captcha",
            textBefore: "点击进行入机身份验证",
            textDuring: "正在验证，请稍等...",
            textAfter: "未通过验证,您可能是入机。",
            duration: Math.floor(Math.random() * (20000 - 10000 + 1)) + 10000,
            success: false,
            dark: false
        };
        var isad = true;
        // 初始化假验证码
        var captcha = new CAPTCHA(config);

        // 获取跳转按钮
        var redirectButton = document.getElementById('redirectButton');

        // 处理跳转按钮点击事件
        function handleRedirect() {
            if (captcha.checked) {
                if (isad) {
                    dududadududa(); isad = false;
                } else {
                    location.reload(); // 刷新页面
                }
            } else {
                // 验证失败，不进行跳转
                //var result= confirm("请通过验证码验证！");


                $.confirm({
                    title: '提示!',
                    content: '请通过验证码验证！',  type: 'blue', boxWidth: '350px', useBootstrap: false,
                    buttons: {

                        cancel: {
                            text: '取消',
                            action: function () {
                                location.assign("captcha.html");
                            }
                        },
                        confirm: {
                            text: '确定',
                            btnClass: 'btn-blue',
                            keys: ['enter', 'shift'],
                            action: function () {
                                dududadududa();
                            }
                        }
                    }
                });


            }
        }

        // 定期轮询验证码状态
        function checkCaptchaStatus() {
            if (captcha.checked) {
                // 验证成功，更新按钮状态
                redirectButton.disabled = false;
                redirectButton.style.backgroundColor = "#2979FF";
                redirectButton.textContent = "刷新页面";
            } else {
                // 验证失败，保持按钮禁用
                redirectButton.disabled = false;
                redirectButton.style.backgroundColor = "#9E9E9E";
                redirectButton.textContent = "请先进行验证";
            }
        }

        // 每秒检查一次验证码状态
        setInterval(checkCaptchaStatus, 500);
        function dududadududa() {
            $.dialog({
                title: '骷髅打金服，上线就送VIP!',
                content: '<a href="http://eterill.us.kg/"><img src="./fakeAD.webp"></img></a>', type: 'green', boxWidth: '350px', boxHeight: "480px",
                useBootstrap: false,
                animation: 'zoom',
                closeAnimation: 'zoom', animationBounce: 1.5
            });
        }
        setInterval(dududadududa, Math.floor(Math.random() * (20000 - 10000 + 1)) + 15000);
    </script>
</body>

</html>
